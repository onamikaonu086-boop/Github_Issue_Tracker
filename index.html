<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Github Issue Tracker</title>
    <style>
      *,
      html,
      body {
        font-family: "Geist", sans-serif;
      }
    </style>
    <script src="/app.js" defer></script>
  </head>

  <body>
    <!-- Login Screen -->
    <section data-screen="login" class="h-screen bg-[#F8FAFC] flex items-center justify-center">
      <div
        class="bg-white shadow-md flex flex-col rounded-md border border-gray-100 p-6 items-center min-w-130"
      >
        <img src="/assets/github-logo.png" alt="Github Logo" class="size-25" />
        <h1 class="text-2xl font-semibold mt-4">Github Issues Trackers</h1>
        <p class="text-gray-500 mt-2">Signin to manage your issue</p>
        <!-- form -->
        <form data-form="login" class="w-full mt-6">
          <div class="flex flex-col gap-1">
            <label for="username" class="font-semibold">Username</label>
            <input
              id="username"
              type="text"
              placeholder="Enter Username"
              class="border border-gray-100 px-4 py-2 rounded-md focus:outline-none focus:border-[#4A00FF] focus:ring-1 focus:ring-[#4A00FF]"
            />
            <p class="text-[#4A00FF] text-sm">Default: admin</p>
          </div>
          <div class="flex flex-col gap-1 mt-4">
            <label for="password" class="font-semibold">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Enter Password"
              class="border border-gray-100 px-4 py-2 rounded-md focus:outline-none focus:border-[#4A00FF] focus:ring-1 focus:ring-[#4A00FF]"
            />
            <p class="text-[#4A00FF] text-sm">Default: admin123</p>
          </div>
          <button class="bg-[#4A00FF] text-white py-3 font-semibold w-full mt-6 rounded-md">Sign In</button>
        </form>

        <!-- error message -->
        <div data-error="login-form-error-node" class="mt-4"></div>

        <div class="flex items-center gap-2 mt-4 w-full">
          <div class="h-0.5 bg-gray-200 grow"></div>
          OR
          <div class="h-0.5 bg-gray-200 grow"></div>
        </div>
        <div class="mt-6 w-full text-center">
          <p class="text-gray-500">Demo Credentials</p>
          <div class="bg-[#F8FAFC] p-4 text-center w-full">
            <p>Username : admin</p>
            <p>Password : admin123</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Issues Screen -->
    <section data-screen="issue" class="hidden">
      <!-- navbar -->
      <nav class="border border-gray-100 shadow-md py-4 bg-white">
        <div class="container mx-auto flex items-center gap-4">
          <img src="/assets/github-logo.png" alt="Github Logo" class="size-8" />
          <h2 class="text-2xl font-semibold">Github Issue Tracker</h2>
          <div class="ml-auto relative">
            <input
              data-input="search"
              type="text"
              placeholder="Search Issues..."
              class="border border-gray-100 px-4 py-2 rounded-md focus:outline-none focus:border-[#4A00FF] focus:ring-1 focus:ring-[#4A00FF] pl-10"
            />

            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-5 absolute top-1/2 left-3 -translate-y-1/2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
              />
            </svg>
          </div>
          <button data-button="search" class="bg-[#4A00FF] text-white py-2 font-semibold px-4 rounded-md">
            Search
          </button>
        </div>
      </nav>

      <!-- filter section -->
      <div class="bg-white px-4 py-4 container mx-auto mt-12 flex items-center gap-2">
        <button
          data-button="filter"
          data-filter-type="all"
          class="border border-gray-100 rounded-md px-4 py-2 w-25 bg-[#4A00FF] text-white"
        >
          All
        </button>
        <button
          data-button="filter"
          data-filter-type="open"
          class="border border-gray-100 rounded-md px-4 py-2 text-gray-500 w-25"
        >
          Open
        </button>
        <button
          data-button="filter"
          data-filter-type="closed"
          class="border border-gray-100 rounded-md px-4 py-2 text-gray-500 w-25"
        >
          Closed
        </button>
      </div>
    </section>
  </body>
</html>
